services:
  db:
    image: postgres:15-alpine
    container_name: swiftly-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: swiftly_user
      POSTGRES_PASSWORD: swiftly_password
      POSTGRES_DB: swiftly_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
